<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qonhub 运营助手</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.topbar h1{font-size:18px;font-weight:700;color:#1e40af}
.topbar select,.topbar input{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-danger{background:#ef4444;color:#fff}
.btn-outline{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-sm{padding:5px 10px;font-size:12px}
.container{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:800px){.container{grid-template-columns:1fr}}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9}
.card-header h2{font-size:15px;font-weight:700}
.card-body{padding:16px 20px;max-height:500px;overflow-y:auto}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-valid{background:#dcfce7;color:#166534}
.badge-expired{background:#fef3c7;color:#92400e}
.badge-empty{background:#f1f5f9;color:#94a3b8}
.empty-state{text-align:center;padding:40px 20px;color:#94a3b8}
.log-area{max-height:150px;overflow-y:auto;font-size:11px;font-family:monospace;background:#1e293b;color:#e2e8f0;padding:12px;border-radius:8px;margin-top:8px;white-space:pre-wrap}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px;border-bottom:1px solid #f1f5f9}
.stat-item{text-align:center}.stat-value{font-size:24px;font-weight:800}.stat-label{font-size:11px;color:#64748b;margin-top:2px}
</style>
</head>
<body>
<div class="topbar">
  <h1>🤖 Qonhub 运营助手</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:12px;padding:4px 10px;border-radius:20px;background:#dcfce7;color:#166534;font-weight:600">🖥️ 桌面模式</span>
    <label>当前客户</label>
    <select id="wsSelect" onchange="switchWorkspace()"><option value="">-- 选择客户 --</option></select>
    <span id="wsStats" style="font-size:12px;color:#94a3b8"></span>
    <button class="btn btn-outline btn-sm" onclick="refreshAll()">🔄 刷新</button>
  </div>
</div>

<div class="container">
  <!-- AI 搜索平台授权 -->
  <div class="card" style="grid-column:1/-1;border:2px solid #818cf8">
    <div class="card-header" style="background:#eef2ff">
      <h2>🤖 AI 搜索平台授权</h2>
      <span style="font-size:11px;color:#6366f1;font-weight:600">品牌AI可见度监测 — 登录后Cookie自动保存</span>
    </div>
    <div class="card-body" id="aiAuthList">
      <div class="empty-state"><p>选择客户后自动加载...</p></div>
    </div>
  </div>

  <!-- 发布平台授权 -->
  <div class="card">
    <div class="card-header"><h2>🔐 发布平台授权</h2><span style="font-size:11px;color:#94a3b8">用于内容分发</span></div>
    <div class="card-body" id="authList"><div class="empty-state"><p>选择客户后查看</p></div></div>
  </div>

  <!-- 缓存状态 -->
  <div class="card">
    <div class="card-header"><h2>📦 缓存状态</h2><button class="btn btn-outline btn-sm" onclick="loadCache()">刷新</button></div>
    <div class="card-body" id="cacheList"><div class="empty-state"><p>选择客户后查看</p></div></div>
  </div>
</div>

<div class="log-area" id="logArea" style="margin:0 24px 16px">就绪，等待操作...</div>

<script>
const API = "http://127.0.0.1:9901";
const API_KEY = "__RPA_API_KEY__";
const CLOUD = (() => { try { return new URLSearchParams(window.location.search).get('cloud') || "http://127.0.0.1:18080/geo_admin"; } catch { return "http://127.0.0.1:18080/geo_admin"; } })();
let currentWs = "";
let wsList = [];

const AI_AUTH_PLATFORMS = [
  { key: "doubao", name: "豆包", icon: "🟢", hint: "字节跳动AI助手" },
  { key: "yuanbao", name: "腾讯元宝", icon: "💎", hint: "腾讯AI助手" },
  { key: "baidu", name: "百度AI", icon: "🔵", hint: "百度搜索AI" },
  { key: "deepseek", name: "DeepSeek", icon: "🐳", hint: "深度求索" },
  { key: "qianwen", name: "通义千问", icon: "🟠", hint: "阿里云AI" },
  { key: "xf_xinghuo", name: "讯飞星火", icon: "🔥", hint: "科大讯飞" },
  { key: "kimi", name: "Kimi", icon: "🌙", hint: "月之暗面" },
];

const AUTH_PLATFORMS = [
  { key: "toutiao", name: "今日头条", icon: "📰" },
  { key: "baijiahao", name: "百家号", icon: "📝" },
  { key: "sohu", name: "搜狐号", icon: "🟢" },
  { key: "xiaohongshu", name: "小红书", icon: "📕" },
  { key: "wechat_mp", name: "微信公众号", icon: "💬" },
  { key: "wangyihao", name: "网易号", icon: "🔴" },
  { key: "bilibili", name: "B站", icon: "📺" },
  { key: "qiehao", name: "企鹅号", icon: "🐧" },
  { key: "smzdm", name: "值得买", icon: "💰" },
  { key: "douyin", name: "抖音", icon: "🎵" },
  { key: "kuaishou", name: "快手", icon: "⚡" },
];

function h(id) { return document.getElementById(id); }
function log(msg) { const el = h("logArea"); el.textContent += msg + "\n"; el.scrollTop = el.scrollHeight; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

async function loadAiAuthPlatforms() {
  if (!currentWs) return;
  const el = h("aiAuthList");
  el.innerHTML = '<div class="empty-state"><p>⏳ 加载中...</p></div>';
  let cachePlatforms = {};
  try {
    const resp = await fetch(API + "/api/cache/list?workspace_id=" + currentWs, {
      headers: { "X-Api-Key": API_KEY },
    });
    const data = await resp.json();
    (data.caches || []).forEach(c => { cachePlatforms[c.platform_key] = c; });
  } catch(e) { log("⚠️ 缓存读取失败: " + e.message); }
  el.innerHTML = AI_AUTH_PLATFORMS.map(p => {
    const cache = cachePlatforms[p.key];
    const loggedIn = cache && cache.valid;
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;gap:12px">'
      + '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">' + p.icon + '</span>'
      + '<div><div style="font-size:14px;font-weight:600">' + p.name + '</div>'
      + '<div style="font-size:11px;color:#94a3b8">' + p.hint + '</div></div></div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:' + (loggedIn ? '#dcfce7' : '#fef3c7') + '">' + (loggedIn ? '✅ 已登录' : '⚠️ 未登录') + '</span>'
      + '<button class="btn btn-sm btn-primary" onclick="authAiLogin(\'' + p.key + '\')">🔑 ' + (loggedIn ? '重新登录' : '一键登录') + '</button>'
      + '</div></div>';
  }).join("");
}

async function authAiLogin(platform) {
  if (!currentWs) return alert("请先选择客户");
  localStorage.setItem("rpa_current_ws", currentWs);
  const p = AI_AUTH_PLATFORMS.find(x => x.key === platform);
  const name = p ? p.name : platform;
  if (!confirm("将打开浏览器窗口登录「" + name + "」\n\n登录完成后请关闭浏览器窗口，Cookie 将自动保存。\n（注意：必须关闭整个浏览器窗口，不是关闭标签页）")) return;
  log("🔑 正在打开 " + name + " 登录页...");
  const btns = h("aiAuthList").querySelectorAll("button");
  btns.forEach(b => { b.disabled = true; b.textContent = "登录中..."; });
  try {
    const resp = await fetch(API + "/api/v1/auth-login", {
      method: "POST", headers: { "Content-Type": "application/json", "X-Api-Key": API_KEY },
      body: JSON.stringify({ platform, workspace_id: currentWs, headless: false }),
    });
    if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.error || 'HTTP ' + resp.status); }
    const data = await resp.json();
    if (data.success) {
      log("✅ " + data.message + " (总量:" + data.total_cookies + ", 新增:" + data.new_cookies + ")");
      alert("✅ " + name + " 授权成功！\n新增 " + data.new_cookies + " 个认证 Cookie\n总计 " + data.total_cookies + " 个 Cookie");
    } else {
      log("⚠️ " + data.message);
      if (data.retryable) {
        alert("⚠️ " + name + " 授权未完成\n\n" + data.message + "\n\n请重新尝试，并在浏览器中完成登录后关闭窗口。");
      } else {
        alert("⚠️ " + name + ": " + data.message);
      }
    }
  } catch (e) { log("❌ 授权失败: " + e.message); alert("授权失败: " + e.message); }
  await new Promise(r => setTimeout(r, 1500));
  await loadAiAuthPlatforms();
}

async function loadAuthPlatforms() {
  if (!currentWs) return;
  const el = h("authList");
  el.innerHTML = '<div class="empty-state"><p>⏳ 加载中...</p></div>';
  let cachePlatforms = {};
  try {
    const resp = await fetch(API + "/api/cache/list?workspace_id=" + currentWs, {
      headers: { "X-Api-Key": API_KEY },
    });
    const data = await resp.json();
    (data.caches || []).forEach(c => { cachePlatforms[c.platform_key] = c; });
  } catch(e) {}
  el.innerHTML = AUTH_PLATFORMS.map(p => {
    const cache = cachePlatforms[p.key];
    const loggedIn = cache && cache.valid;
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9">'
      + '<div style="display:flex;align-items:center;gap:8px"><span>' + p.icon + '</span> <span style="font-weight:600">' + p.name + '</span>'
      + '<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:' + (loggedIn ? '#dcfce7' : '#fef3c7') + '">' + (loggedIn ? '✅ 已登录' : '⚠️ 未登录') + '</span></div>'
      + '<button class="btn btn-sm btn-primary" onclick="authLogin(\'' + p.key + '\')">🔑 ' + (loggedIn ? '重新登录' : '授权登录') + '</button></div>';
  }).join("");
}

async function authLogin(platform) {
  if (!currentWs) return alert("请先选择客户");
  localStorage.setItem("rpa_current_ws", currentWs);
  const p = AUTH_PLATFORMS.find(x => x.key === platform);
  const name = p ? p.name : platform;
  if (!confirm("将打开浏览器窗口登录「" + name + "」\n\n登录完成后请关闭浏览器窗口，Cookie 将自动保存。\n（注意：必须关闭整个浏览器窗口，不是关闭标签页）")) return;
  log("🔑 正在打开 " + name + " 登录页...");
  const btns = h("authList").querySelectorAll("button");
  btns.forEach(b => { b.disabled = true; b.textContent = "登录中..."; });
  try {
    const resp = await fetch(API + "/api/v1/auth-login", {
      method: "POST", headers: { "Content-Type": "application/json", "X-Api-Key": API_KEY },
      body: JSON.stringify({ platform, workspace_id: currentWs, headless: false }),
    });
    if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.error || 'HTTP ' + resp.status); }
    const data = await resp.json();
    if (data.success) {
      log("✅ " + data.message + " (新增" + data.new_cookies + "个，共" + data.total_cookies + "个)");
      alert("✅ " + name + " 授权成功！\n新增 " + data.new_cookies + " 个认证 Cookie");
    } else {
      log("⚠️ " + data.message);
      if (data.retryable) {
        alert("⚠️ " + name + " 授权未完成\n\n" + data.message + "\n\n请重新尝试。");
      } else {
        alert("⚠️ " + data.message);
      }
    }
  } catch (e) { log("❌ 授权失败: " + e.message); alert("授权失败: " + e.message); }
  await new Promise(r => setTimeout(r, 1500));
  loadAuthPlatforms();
}

async function loadCache() {
  if (!currentWs) return;
  const el = h("cacheList");
  try {
    const resp = await fetch(API + "/api/cache/list?workspace_id=" + currentWs, {
      headers: { "X-Api-Key": API_KEY },
    });
    const data = await resp.json();
    if (!data.caches || data.caches.length === 0) { el.innerHTML = '<div class="empty-state"><p>无缓存数据</p></div>'; return; }
    el.innerHTML = data.caches.map(c => {
      const valid = c.valid; const size = c.size_kb || 0;
      return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9">'
        + '<span>' + escHtml(c.platform_name || c.platform_key) + '</span>'
        + '<span class="badge ' + (valid ? 'badge-valid' : 'badge-empty') + '">' + (valid ? '✅ 有效 ' + size + 'kb' : '无缓存') + '</span></div>';
    }).join("");
  } catch(e) { el.innerHTML = '<div class="empty-state"><p>加载失败</p></div>'; }
}

async function loadWorkspaces() {
  try {
    const resp = await fetch(CLOUD + "/api/v1/rpa/my-workspaces", {headers: {"X-Api-Key": API_KEY}});
    const data = await resp.json();
    wsList = data.workspaces || [];
    if (wsList.length === 0) { try { wsList = JSON.parse(localStorage.getItem("rpa_workspaces") || "[]"); } catch { wsList = []; } }
    else localStorage.setItem("rpa_workspaces", JSON.stringify(wsList));
  } catch(e) {
    try { wsList = JSON.parse(localStorage.getItem("rpa_workspaces") || "[]"); } catch { wsList = []; }
    log("⚠️ 云端不可达，使用本地缓存");
  }
  if (wsList.length === 0) wsList = [{id: 7, name: "默认客户 #7"}];
  renderWsSelect();
}

function renderWsSelect() {
  const sel = h("wsSelect");
  sel.innerHTML = '<option value="">-- 选择客户 --</option>' + wsList.map(w => '<option value="' + escHtml(String(w.id)) + '">' + escHtml(w.name) + ' (#' + escHtml(String(w.id)) + ')</option>').join("");
}

function switchWorkspace() {
  currentWs = h("wsSelect").value;
  if (!currentWs) return;
  localStorage.setItem("rpa_current_ws", currentWs);
  h("wsStats").textContent = "WS-" + currentWs;
  loadAiAuthPlatforms();
  loadAuthPlatforms();
  loadCache();
  log("✅ 已切换到 WS-" + currentWs);
}

function refreshAll() {
  if (currentWs) { loadAiAuthPlatforms(); loadAuthPlatforms(); loadCache(); }
}

(async () => {
  let saved = localStorage.getItem("rpa_current_ws");
  if (!saved) saved = "7";
  currentWs = saved;
  await loadWorkspaces();
  h("wsSelect").value = saved;
  h("wsStats").textContent = "WS-" + saved;
  loadAiAuthPlatforms();
  loadAuthPlatforms();
  loadCache();
  log("✅ 运营助手就绪 (WS-" + saved + ")");
})();
</script>
</body>
</html>
