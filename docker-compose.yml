name: geoflow-laravel

services:
  postgres:
    image: ${PGVECTOR_IMAGE:-pgvector/pgvector:pg16}
    container_name: geoflow-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-geo_flow}
      POSTGRES_USER: ${DB_USERNAME:-geo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geo_password}
    ports:
      - "127.0.0.1:${DB_EXPOSE_PORT:-15432}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./docker-data/dev/postgres}:${POSTGRES_CONTAINER_DATA_DIR:-/var/lib/postgresql}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-geo_user} -d ${DB_DATABASE:-geo_flow}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: geoflow-redis
    ports:
      - "127.0.0.1:${REDIS_EXPOSE_PORT:-16379}:6379"
    restart: unless-stopped

  assets:
    image: ${NODE_IMAGE:-node:22-bookworm-slim}
    container_name: geoflow-assets
    working_dir: /var/www/html
    command: ["sh", "-lc", "npm ci --include=dev --no-audit --no-fund && npm run build"]
    volumes:
      - ./:/var/www/html
      - geoflow-node-modules:/var/www/html/node_modules
    restart: "no"

  init:
    image: geoflow-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_CLI_IMAGE: ${PHP_CLI_IMAGE:-php:8.4-cli-bookworm}
        COMPOSER_PACKAGIST_MIRROR: ${COMPOSER_PACKAGIST_MIRROR:-}
    container_name: geoflow-init
    working_dir: /var/www/html
    env_file:
      - ./.env
    # 交给 entrypoint 执行自动初始化（生成 APP_KEY / migrate / geoflow:install）
    command: ["php", "artisan", "about"]
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

  app:
    image: geoflow-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_CLI_IMAGE: ${PHP_CLI_IMAGE:-php:8.4-cli-bookworm}
        COMPOSER_PACKAGIST_MIRROR: ${COMPOSER_PACKAGIST_MIRROR:-}
    container_name: geoflow-app
    working_dir: /var/www/html
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${APP_PORT:-18080}:8080"
    volumes:
      - ./:/var/www/html
    depends_on:
      assets:
        condition: service_completed_successfully
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  queue:
    image: geoflow-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_CLI_IMAGE: ${PHP_CLI_IMAGE:-php:8.4-cli-bookworm}
        COMPOSER_PACKAGIST_MIRROR: ${COMPOSER_PACKAGIST_MIRROR:-}
    container_name: geoflow-queue
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "redis", "--queue=geoflow,distribution,content-publish,theme-replication,agent_scout,default", "--sleep=1", "--tries=3", "--timeout=600"]
    volumes:
      - ./:/var/www/html
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  scheduler:
    image: geoflow-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_CLI_IMAGE: ${PHP_CLI_IMAGE:-php:8.4-cli-bookworm}
        COMPOSER_PACKAGIST_MIRROR: ${COMPOSER_PACKAGIST_MIRROR:-}
    container_name: geoflow-scheduler
    working_dir: /var/www/html
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./:/var/www/html
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  reverb:
    image: geoflow-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_CLI_IMAGE: ${PHP_CLI_IMAGE:-php:8.4-cli-bookworm}
        COMPOSER_PACKAGIST_MIRROR: ${COMPOSER_PACKAGIST_MIRROR:-}
    container_name: geoflow-reverb
    working_dir: /var/www/html
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${REVERB_EXPOSE_PORT:-18081}:8080"
    volumes:
      - ./:/var/www/html
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── RPA 浏览器自动化引擎（Node.js Playwright） ──
  rpa-engine:
    build:
      context: ./rpa-engine
      dockerfile: Dockerfile
    container_name: qonhub-rpa-engine
    environment:
      - RPA_PORT=9901
      - RPA_API_KEY=${RPA_ENGINE_API_KEY:-qonhub-rpa-secret-change-me}
      - RPA_HEADLESS=${RPA_HEADLESS:-true}
      - RPA_BACKEND=${RPA_BACKEND:-local}
      - BROWSERLESS_WS_URL=ws://browserless:3000
    ports:
      - "127.0.0.1:${RPA_EXPOSE_PORT:-9901}:9901"
    volumes:
      - ./rpa-engine/screenshots:/app/screenshots
      - ./rpa-engine/logs:/app/logs
      - ./rpa-engine/storage:/app/storage
    restart: unless-stopped

  # ── Browserless Chrome 集群（Docker 化无头浏览器后端） ──
  # 启用方式: RPA_BACKEND=browserless docker compose up -d browserless
  browserless:
    image: browserless/chrome:latest
    container_name: qonhub-browserless
    ports:
      - "127.0.0.1:${BROWSERLESS_PORT:-3000}:3000"
    environment:
      - TOKEN=${BROWSERLESS_TOKEN:-}
      - MAX_CONCURRENT_SESSIONS=${BROWSERLESS_CONCURRENCY:-10}
      - SESSION_TIMEOUT=${BROWSERLESS_SESSION_TIMEOUT:-600000}
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
      - CONNECTION_TIMEOUT=300000
    restart: unless-stopped
    profiles:
      - browserless
      - production

volumes:
  # ── v2.6.0 Phase 4: Playwright MCP 浏览器自动化服务 ──
  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    container_name: qonhub-playwright-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PLAYWRIGHT_PORT:-8931}:8931"
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    volumes:
      - playwright-browsers:/ms-playwright
      - rpa-engine/storage/states:/states:ro  # 只读挂载Cookie文件
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8931/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - qonhub

  geoflow-node-modules:
